<!DOCTYPE html>
<html lang="en-US">
	<head>
		<meta charset="utf-8">
		<title>slate-template</title>
		<link rel="stylesheet" href="./src/styles/global.min.css">
		<link rel="stylesheet" href="./src/styles/bootstrap-grid.min.css">

		<!--  -->
		<!-- Only for Slate Admissions Template -->
		<!--  -->
		<style>
				#apply-hero{
					display: none;
					position: relative;
					z-index: 0;
					background-image: url('https://uaz.test.technolutions.net/sites/all/themes/custom/az_theme/images/hero-apply.jpg');
					background-position: center;
					background-repeat: none;
					background-size: cover;
					z-index: 900;
					margin-bottom: 60px;
				}
				#apply-hero.active{
					display: block;
				}
				#apply-hero-content{
					position: relative;
					z-index: 0;
					align-items: center;
					justify-content: space-between;
					width: 100%;
					max-width: 1180px;
					padding: 114px 24px;
					margin: auto;
					box-sizing: border-box;
				}
				.apply-hero-group{
					width: 100%;
					position: relative;
					display: flex;
				}
				.apply-hero-group.dir-row{
					flex-direction: row;	
				}
				.apply-hero-group.dir-col{
					flex-direction: column;
				}
				.apply-hero-group.align-fs{
					align-items: flex-start;
				}
				.apply-hero-group.justif-sb{
					justify-content: space-between;
				}
				.apply-hero-title{
					display: block;
					position: relative;
					color: white;
					font-size: 21px;
					font-weight: 900;
					line-height: 1;
					margin-block-start: 1em;
    			margin-block-end: 1em;	
				}
				.apply-hero-title:before{
					content: "";
					position: absolute;
					top: -24px;
					left: 0;
					width: 27px;
					height: 7px;
					background-color: #ef4056;
				}
				.apply-hero-cta{
					display: block;
					font-weight: 900;
					text-transform: uppercase;
					line-height: 1;
					font-size: 58px;
					margin: 0 0 12px 0;
					padding: 0;
					color: white;
				}
				#c_block-bean-double-cta-next-steps-and-ua-fut .c_entity-bean.c_bean-double-cta.c_view-mode-double_cta_link_and_text table.fixed h2{
						font-family: proxima-nova,calibri,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif,"Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji";
						font-size: 30px;
						color: #0c234b;
						line-height: 1.3;
						font-weight: 800;
						margin: 0;
				}
				.az-footer-custom{
						display: block;
						margin-top: 120px;
				}
				@media screen and (max-width: 1200px){
					/* ${breakpoint.device.md} */
					#apply-hero{
						padding: 114px 24px;
					}
				}
				@media screen and (max-width: 992px){
					/* ${breakpoint.device.sm} */
					#apply-hero{
						padding: 75px 24px;
					}
				}
				@media screen and (max-width: 768px){
					/* ${breakpoint.device.xs} */
					#apply-hero{
						padding: 60px 24px;
					}
					.apply-hero-title{
						text-align: center;
					}
					.apply-hero-title:before{
						right: 0;
						margin:auto;
					}
					.apply-hero-cta{
						margin: auto;
						text-align: center;
					}
					#c_block-bean-double-cta-next-steps-and-ua-fut .c_entity-bean.c_bean-double-cta.c_view-mode-double_cta_link_and_text table.fixed h2{
						font-size: 24px;
					}
				}
		</style>
		<script type="text/javascript">
			function ready() {
				let url = window.location.href || '',
						isApply = new RegExp('(?:^(#|\/)|(slate\.admissions\.arizona\.edu\/apply)|uaz\.test\.technolutions\.net\/apply)', 'i').test(url),
						applyHero = document.getElementById('apply-hero');
				// if url is https://slate.admissions.arizona.edu/apply/ or https://uaz.test.technolutions.net/apply/
				isApply === true ? applyHero.classList.add('active') : '';
			}
			document.addEventListener("DOMContentLoaded", ready);
		</script>
		<!--  -->
		<!-- Only for Slate Admissions Template -->
		<!--  -->


	</head>
	<body>
		<az-redbar baseurl="https://live-az-admissions.pantheonsite.io" thisUrl="https://arizona.edu" menuId="resources"></az-redbar>
		<az-middle-header></az-middle-header>
		<az-main-menu baseurl="https://live-az-admissions.pantheonsite.io" thisUrl="https://arizona.edu" menuId="main"></az-main-menu>

		<!--  -->
		<!-- Only for Slate Admissions Template -->
		<!--  -->
		<div id="apply-hero">
			<div id="apply-hero-content">
					<div class="apply-hero-group dir-col align-fs justif-sb">
						<div class="apply-hero-group dir-col">
							<h1 class="apply-hero-title">Apply</h1>
							<strong class="apply-hero-cta">Future Wildcat<br />Application Login</strong>
						</div>
					</div>
			</div>
		</div>
		<!--  -->
		<!-- Only for Slate Admissions Template -->
		<!--  -->


		<az-footer class="az-footer-custom" thisUrl="https://arizona.edu"></az-footer>
	</body>
	<script src="./dist/header.js"></script>
	<script src="./dist/az-footer.js"></script>
</html>
